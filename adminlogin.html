<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>DuaBakes</title>
        <link rel="stylesheet" type="text/css" href="signup.css">
        <link rel="stylesheet" type="text/css" href="Navbar.css">
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    </head>
    <body>
        <div id="navbar"></div>

        <header>
            <h1>Welcome to DuaBakes</h1>
            <h2>Admin Login</h2>
        </header>

        <form id="adminLoginForm">
            <table>
                <tr>
                    <td><label for="email">Email:</label></td>
                    <td><input type="email" name="email" id="email" placeholder="your email" required></td>
                </tr>
                <tr>
                    <td><label for="password">Password</label></td>
                    <td><input type="password" name="password" id="password" placeholder="your secret" required></td>
                </tr>
                <tr>
                    <td colspan="2"><button type="submit">Login</button></td>
                </tr>
            </table>
        </form>

        <script src="api.js"></script>
        <script>
            document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const result = await adminLogin(email, password);
                alert(result.status || 'Admin login completed');
            });
        </script>
        <script>
            $(document).ready(function() {
                $("#navbar").load("./Navbar.html");
            });
        </script>
    </body>
</html>
